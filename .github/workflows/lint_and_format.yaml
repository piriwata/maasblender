name: Lint and Format

on:
  pull_request:
    branches:
      - "main"
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  check-license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - run: ruff format . --check
      - run: ruff check . --output-format=github
