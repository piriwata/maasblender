name: Integration Test

on:
  push:
    branches:
      - "main"
      - "v[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
    branches:
      - "main"
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      subdirs: ${{ steps.set-subdir.outputs.target-list }}
    steps:
      - uses: actions/checkout@v4
      - name: Get ci test case directories
        id: set-subdir
        run: |
          list=$(find ./ci -name run_integration_test.py | sed -r "s/^(.*)run_integration_test.py/\1/g" | jq -R -s -c 'split("\n")[:-1]')
          echo "target-list=$list" >> $GITHUB_OUTPUT

  integration-test:
    name: Run integration test (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: set-matrix
    strategy:
      matrix:
        target: ${{ fromJson(needs.set-matrix.outputs.subdirs) }}
    defaults:
      run:
        working-directory: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Run docker compose up
        run: docker compose up -d

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration test
        run: python run_integration_test.py
